<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What We Do</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for a clean, bold sans-serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Nav Menu -->
    <nav class="nav-menu">
        <a href="/" class="back-home">← Back to Home</a>
    </nav>

    <!-- Main Container -->
    <main class="container">
        
        <!-- Large Decorative Circle Element -->
        <div class="circle-overlay"></div>

        <!-- Typography Layout Grid -->
        <div class="hero-grid">
            <h1 class="text-what">WHAT</h1>
            
            <div class="content-block">
                <p>Nossa paixão é guiar empreendedoras a encontrarem sua voz única no mundo dos negócios, criando marcas com sentido e emoção, sem ser mais do mesmo. Com a Dual, você descobre a beleza da dualidade e o poder de uma marca verdadeiramente excepcional.</p>
            </div>
            
            <h1 class="text-we">WE</h1>
            <h1 class="text-do">DO</h1>
        </div>

    </main>

</body>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #0d0d0d;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

/* Nav Menu */
.nav-menu {
    padding: 20px 40px;
    z-index: 10;
}

.back-home {
    color: #a0a0a0;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    transition: color 0.3s ease;
}

.back-home:hover {
    color: #ffffff;
}

/* Layout Container */
.container {
    flex: 1;
    position: relative;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

/* The Subtle White Geometric Curve Line */
.circle-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 75vw;
    height: 75vw;
    max-width: 700px;
    max-height: 700px;
    
    /* Keep the solid, thin clean line from the original image */
    border: 1px solid rgba(255, 255, 255, 0.5); 
    border-radius: 50%;
    
    /* Cuts out a tiny 15-degree wedge so you can visually see it spinning */
    clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 0 40%, 50% 50%, 0 35%);
    
    pointer-events: none;
    z-index: 1;

    /* Triggers the spin animation */
    animation: spinCircle 12s linear infinite;
}

/* Keep this at the bottom of your CSS file */
@keyframes spinCircle {
    from {
        transform: translate(-50%, -50%) rotate(0deg);
    }
    to {
        transform: translate(-50%, -50%) rotate(360deg);
    }
}

/* Hero Grid Structure */
.hero-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    width: 100%;
    z-index: 2;
    position: relative;
}

/* Massive Typography Rules */
h1 {
    font-size: clamp(4rem, 15vw, 13rem);
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.04em;
    text-transform: uppercase;
}

.text-what {
    grid-column: 1 / span 10;
    grid-row: 1;
    margin-bottom: 2rem;
}

.content-block {
    grid-column: 2 / span 5;
    grid-row: 2;
    align-self: center;
    padding-right: 20px;
    margin: 3rem 0;
}

.content-block p {
    font-size: clamp(0.9rem, 1.2vw, 1.15rem);
    line-height: 1.6;
    color: #cccccc;
    font-weight: 400;
}

.text-we {
    grid-column: 7 / span 6;
    grid-row: 2;
    align-self: center;
    justify-self: end;
    border-bottom: 6px solid #ffffff;
    padding-bottom: 10px;
}

.text-do {
    grid-column: 1 / span 6;
    grid-row: 3;
    margin-top: 2rem;
}

/* Responsive Breakpoints */

/* Tablets and small laptops */
@media (max-width: 900px) {
    .content-block {
        grid-column: 1 / span 7;
    }
    .text-we {
        grid-column: 8 / span 5;
    }
}

/* Mobile Devices */
@media (max-width: 600px) {
    .hero-grid {
        display: flex;
        flex-direction: column;
    }

    h1 {
        font-size: 18vw; /* Scales aggressively on small phones */
    }

    .text-what {
        margin-bottom: 1.5rem;
    }

    .content-block {
        width: 100%;
        padding-right: 0;
        margin: 2rem 0;
    }

    .text-we {
        align-self: flex-end;
        border-bottom-width: 4px;
        margin-bottom: 1.5rem;
    }

    .text-do {
        margin-top: 0;
    }

    .circle-overlay {
        width: 90vw;
        height: 90vw;
    }
}
</style>
</html>
