<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Blog</title>
  <link rel="icon" type="image/png" href="/images/logo.jpg">
  <!-- Google Fonts for Editorial Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/common.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="/common.js"></script>

  <div class="page-wrapper">
    
    <!-- Header Section -->
    <header class="blog-header">
      <div class="header-overlay"></div>
      <div class="header-content">
        <h1>THE BLOG</h1>
        <p class="subtitle">STAY UP TO DATE ON TIPS, TRICKS, & TRENDS FOR SOCIAL MEDIA & DIGITAL MARKETING</p>
      </div>
    </header>

    <!-- Navigation / Filter Bar -->
    <nav class="blog-nav">
      <span class="nav-title">Browse the blog:</span>
      <ul class="nav-links">
        <li><a href="/">Back To Home</a></li>
      </ul>
    </nav>

    <!-- Main Featured Content Area -->
    <main class="main-content" id="mainContent">
      <div style="text-align:center; width:100%; padding:60px 0; font-family:'Playfair Display', serif; color:#888;">Loading the latest story…</div>
    </main>

    <!-- Additional posts, shown only when there's more than one -->
    <section class="more-posts" id="morePosts"></section>

  </div>

<script>
  const API = 'https://api.tixtee.xyz/api';

  function resolveImage(post){
    if(!post.image_url) return 'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?q=80&w=1000&auto=format&fit=crop';
    return post.image_url.startsWith('/uploads') ? 'https://api.tixtee.xyz' + post.image_url : post.image_url;
  }

  function renderFeatured(post){
    const main = document.getElementById('mainContent');
    main.innerHTML = `
      <article class="featured-story">
        <div class="image-container">
          <div class="badge-circle">
            <span>READ THE<br>LATEST</span>
          </div>
          <img src="${resolveImage(post)}" alt="${post.title}">
        </div>
        <div class="text-card">
          <h2 class="story-title">${post.title}</h2>
          <p class="story-excerpt">${post.excerpt || (post.content ? post.content.slice(0, 260) + '…' : '')}</p>
          <a class="coming-soon-tag" href="/blog/${post.slug || post.id}" style="text-decoration:none;">READ FULL STORY</a>
        </div>
      </article>
    `;
  }

  function renderMorePosts(posts){
    const wrap = document.getElementById('morePosts');
    if(!posts.length){ wrap.innerHTML = ''; return; }
    wrap.innerHTML = `
      <div style="padding:0 10% 100px; display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:40px;">
        ${posts.map(post => `
          <a href="/blog/${post.slug || post.id}" style="text-decoration:none; color:inherit;">
            <div style="height:200px; overflow:hidden; margin-bottom:16px;">
              <img src="${resolveImage(post)}" alt="${post.title}" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <h3 style="font-family:'Cinzel', serif; font-size:1.05rem; font-weight:400; letter-spacing:0.5px; margin-bottom:10px; color:#111;">${post.title}</h3>
            <p style="font-family:'Playfair Display', serif; font-size:0.85rem; color:#777; line-height:1.6;">${post.excerpt || ''}</p>
          </a>
        `).join('')}
      </div>
    `;
  }

  async function loadPosts(){
    try{
      const res = await fetch(`${API}/blogs?published=true`);
      const posts = await res.json();

      if(!posts.length){
        document.getElementById('mainContent').innerHTML = `
          <div style="text-align:center; width:100%; padding:60px 0; font-family:'Playfair Display', serif; color:#888;">
            No stories yet — check back soon.
          </div>`;
        return;
      }

      renderFeatured(posts[0]);
      renderMorePosts(posts.slice(1));
    }catch(err){
      document.getElementById('mainContent').innerHTML = `
        <div style="text-align:center; width:100%; padding:60px 0; font-family:'Playfair Display', serif; color:#888;">
          Could not load posts. Is the backend running?
        </div>`;
    }
  }
  loadPosts();
</script>
</body>
<style>
    /* --- Reset & Global Styles --- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #ffffff;
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: #2b2b2b;
  min-height: 100vh;
}

/* Page Frame stretched to full width */
.page-wrapper {
  width: 100%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* --- Full-Screen Header --- */
.blog-header {
  position: relative;
  height: 400px; /* Made slightly taller for big screens */
  background-color: #111111;
  background-image: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #111111 70%);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 40px;
  width: 100%;
}

/* Soft smoky texture overlay simulation */
.header-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%), 
              linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%);
  background-size: 60px 60px;
  opacity: 0.4;
  filter: blur(2px);
}

.header-content {
  position: relative;
  z-index: 2;
  max-width: 800px;
}

.blog-header h1 {
  font-family: 'Cinzel', serif;
  font-size: 4rem;
  font-weight: 400;
  color: #ffffff;
  letter-spacing: 8px;
  margin-bottom: 20px;
}

.blog-header .subtitle {
  font-size: 0.75rem;
  letter-spacing: 4px;
  color: #c5c5c5;
  line-height: 1.8;
  font-weight: 400;
}

/* --- Full-Width Navigation Bar --- */
.blog-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 35px 10%; /* Uses percentages so it scales with screen width */
  border-bottom: 1px solid #f0ede9;
  width: 100%;
}

.nav-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.2rem;
  color: #444;
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 40px;
}

.nav-links a {
  text-decoration: none;
  font-size: 0.7rem;
  color: #2b2b2b;
  letter-spacing: 2px;
  font-weight: 500;
  transition: opacity 0.2s ease;
}

.nav-links a:hover {
  opacity: 0.6;
}

/* --- Main Content Laptop/Desktop Scale --- */
.main-content {
  padding: 80px 10%; /* Matches nav bar padding seamlessly */
  display: flex;
  justify-content: center;
  align-items: center;
  flex-grow: 1;
}

.featured-story {
  display: grid;
  grid-template-columns: 1.2fr 0.8fr; /* Editorial asymmetrical balance */
  align-items: center;
  width: 100%;
  max-width: 1400px; /* Keeps layout from over-stretching on ultra-wide monitors */
  position: relative;
}

/* Image Wrapper and Badge Positioning */
.image-container {
  position: relative;
  width: 100%;
  height: 580px; /* Taller on laptops to feel premium */
  z-index: 1;
}

.image-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.badge-circle {
  position: absolute;
  top: -25px;
  left: -25px;
  width: 85px;
  height: 85px;
  background-color: #1b1b1b;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

.badge-circle span {
  color: #ffffff;
  font-size: 0.6rem;
  letter-spacing: 1px;
  text-align: center;
  line-height: 1.4;
  font-weight: 400;
}

/* Overlapping Editorial Text Card */
.text-card {
  background-color: #ffffff;
  padding: 60px 50px 60px 80px;
  margin-left: -100px; /* Deep shift overlap onto image */
  position: relative;
  z-index: 2;
  box-shadow: 15px 15px 40px rgba(0, 0, 0, 0.04);
}

.story-title {
  font-family: 'Cinzel', serif;
  font-size: 2rem;
  line-height: 1.4;
  font-weight: 400;
  letter-spacing: 1px;
  margin-bottom: 25px;
  color: #111;
}

.story-excerpt {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem;
  line-height: 1.9;
  color: #555;
  margin-bottom: 35px;
}

/* Custom placeholder label element */
.coming-soon-tag {
  display: inline-block;
  font-size: 0.75rem;
  letter-spacing: 2px;
  font-weight: 600;
  color: #888;
  border-bottom: 1px solid #bbb;
  padding-bottom: 6px;
  text-transform: uppercase;
}

/* --- Responsive Layout Breakpoints --- */

@media (max-width: 1024px) {
  .blog-nav {
    padding: 30px 40px;
  }
  .main-content {
    padding: 60px 40px;
  }
  .image-container {
    height: 480px;
  }
  .story-title {
    font-size: 1.65rem;
  }
}

@media (max-width: 850px) {
  .featured-story {
    grid-template-columns: 1fr; /* Stacks column on small tablets/mobile */
  }

  .image-container {
    height: 380px;
  }

  .text-card {
    margin-left: 0;
    margin-top: -50px; /* Shifts up over image vertically */
    padding: 40px 30px;
    width: 90%;
  }
}

@media (max-width: 600px) {
  .blog-header h1 {
    font-size: 2.5rem;
  }

  .blog-nav {
    flex-direction: column;
    gap: 15px;
    text-align: center;
    padding: 20px;
  }

  .nav-links {
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
  }

  .image-container {
    height: 280px;
  }

  .badge-circle {
    top: -10px;
    left: -10px;
    width: 65px;
    height: 65px;
  }

  .text-card {
    width: 100%;
    margin-top: 0;
    padding: 30px 15px;
  }

  .story-title {
    font-size: 1.35rem;
  }
}
</style>
</html>
