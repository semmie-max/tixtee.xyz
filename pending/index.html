<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're in — tixtee</title>
<link rel="icon" type="image/png" href="/images/logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/common.css">
<meta name="description" content="Simple, honest pricing for hosting events on Tixtee — no hidden fees.">
<meta property="og:title" content="Pending — Tixtee">
<meta property="og:description" content="See what it costs to list your event on Tixtee.">
<meta property="og:image" content="images/tix.jpg">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
  html,body{height:100%;}
  body{
    background:#000;
    color:#fff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow:hidden;
  }

  .spotlight{
    position:absolute; top:-10%; width:340px; height:600px;
    background:linear-gradient(180deg, rgba(71,3,78,0.55), transparent 70%);
    filter:blur(30px); pointer-events:none;
  }
  .spotlight.left{left:-6%; transform:rotate(18deg);}
  .spotlight.right{right:-6%; transform:rotate(-18deg);}

  .card{
    position:relative; z-index:2;
    max-width:420px; width:100%;
    text-align:center;
  }

  .icon-row{
    display:flex; align-items:center; justify-content:center; gap:14px;
    margin-bottom:28px;
  }
  .icon-line{flex:1; height:1px; background:rgba(255,255,255,0.2); max-width:70px; position:relative;}
  .icon-line::after{
    content:""; position:absolute; right:-3px; top:50%; transform:translateY(-50%);
    width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.5);
  }
  .icon-line.reverse::after{left:-3px; right:auto;}
  .icon-circle{
    width:48px; height:48px; border-radius:50%; background:#1a1a1a; border:1px solid rgba(255,255,255,0.1);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; flex-shrink:0;
  }
  .icon-circle span{color:#fff;}

  h1{font-size:26px; font-weight:700; letter-spacing:-0.5px; margin-bottom:12px;}
  .subtitle{font-size:13px; color:rgba(255,255,255,0.55); line-height:1.6; margin-bottom:32px; max-width:34ch; margin-left:auto; margin-right:auto;}

  .link-row{
    display:flex; align-items:center; gap:10px;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
    border-radius:100px; padding:6px 6px 6px 18px; margin-bottom:28px;
  }
  .link-row input{
    flex:1; background:none; border:none; outline:none; color:rgba(255,255,255,0.5);
    font-size:12px; font-family:'Inter',sans-serif;
  }
  .copy-btn{
    width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,0.08);
    border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:background 0.2s ease;
  }
  .copy-btn:hover{background:rgba(255,255,255,0.15);}
  .copy-btn svg{width:15px; height:15px;}

  .or-row{display:flex; align-items:center; gap:14px; margin-bottom:24px;}
  .or-row .icon-line{max-width:none;}
  .or-row span{font-size:11px; color:rgba(255,255,255,0.4);}

  .share-row{display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
  .share-btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 20px; border-radius:100px; font-size:12px; font-weight:600;
    text-decoration:none; border:none; cursor:pointer; transition:opacity 0.2s ease;
  }
  .share-btn:hover{opacity:0.85;}
  .share-btn.x{background:#fff; color:#000;}
  .share-btn.whatsapp{background:#25D366; color:#fff;}
  .share-btn.facebook{background:#1877F2; color:#fff;}
  .share-btn svg{width:14px; height:14px;}

  .home-link{
    display:inline-block; margin-top:32px; font-size:12px; color:rgba(255,255,255,0.4);
    text-decoration:underline; text-underline-offset:3px;
  }
  .home-link:hover{color:rgba(255,255,255,0.7);}

  @media(max-width:480px){
    .share-row{flex-direction:column; align-items:stretch;}
    .share-btn{justify-content:center;}
  }
</style>
</head>
<body>
  <body data-loader="auth">
  <script src="/common.js"></script>

  <div class="spotlight left"></div>
  <div class="spotlight right"></div>

  <div class="card">
    <div class="icon-row">
      <div class="icon-line"></div>
      <div class="icon-circle"><span>T</span></div>
      <div class="icon-line reverse"></div>
    </div>

    <h1>You are on the waitlist</h1>
    <p class="subtitle">You're in. We're putting the finishing touches on your dashboard and it will be available to you upon launch</p>

    <div class="link-row">
      <input type="text" id="shareLink" value="https://tixtee.xyz" readonly>
      <button class="copy-btn" id="copyBtn" title="Copy link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </button>
    </div>

    <div class="or-row">
      <div class="icon-line" style="max-width:none;"></div>
      <span>Or</span>
      <div class="icon-line reverse" style="max-width:none;"></div>
    </div>

    <div class="share-row">
      <a class="share-btn x" href="https://twitter.com/intent/tweet?text=Just%20joined%20the%20tixtee%20waitlist!&url=https://tixtee.xyz" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.9 2H22l-7.5 8.6L23.3 22H16.9l-5-6.5L6.1 22H3l8-9.2L2.9 2h6.6l4.5 6 4.9-6z"/></svg>
        Share to X
      </a>
      <a class="share-btn whatsapp" href="https://wa.me/?text=Just%20joined%20the%20tixtee%20waitlist!%20https://tixtee.xyz" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 00-8.5 15.2L2 22l4.9-1.5A10 10 0 1012 2zm5.6 14.2c-.2.7-1.4 1.3-2 1.4-.5.1-1.1.2-3.5-.8-2.9-1.2-4.8-4.2-5-4.4-.1-.2-1.2-1.6-1.2-3.1s.8-2.2 1.1-2.5c.3-.3.6-.4.8-.4h.6c.2 0 .4 0 .6.5.2.5.7 1.8.8 1.9.1.2.1.3 0 .5-.1.2-.2.3-.3.5-.2.2-.3.3-.5.5-.2.2-.3.4-.1.7.2.3.8 1.3 1.7 2.1 1.2 1 2.1 1.4 2.5 1.5.3.1.5.1.7-.1.2-.2.7-.8.9-1.1.2-.3.4-.2.7-.1.3.1 1.7.8 2 1 .3.1.5.2.6.3.1.2.1.9-.1 1.6z"/></svg>
        Share to whatsapp
      </a>
    </div>

    <a class="home-link" href="/">← Back to home</a>
  </div>

<script>
  document.getElementById('copyBtn').addEventListener('click', () => {
    const input = document.getElementById('shareLink');
    input.select();
    navigator.clipboard.writeText(input.value);
    const btn = document.getElementById('copyBtn');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(() => {
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
    }, 1500);
  });
</script>
</body>
</html>
