<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event — tixtee</title>
<link rel="icon" type="image/png" href="images/logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="common.css">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#ffffff; --ink-2:#f4f4f4; --parchment:#111111; --parchment-dim:#6b6b6b;
    --amber:#111111; --amber-dim:#4d4d4d; --wine:#111111;
    --line:rgba(17,17,17,0.12); --shadow: 0 20px 60px rgba(0,0,0,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--ink); color:var(--parchment); font-family:'Inter',sans-serif;}
  .display{font-family:'Fraunces',serif;}
  .mono{font-family:'IBM Plex Mono',monospace; letter-spacing:0.04em;}
  a{color:inherit; text-decoration:none;}
  nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px clamp(20px,5vw,64px);
  }
  .brand{font-family:'Fraunces',serif; font-weight:500; font-size:15px;}
  .back{font-size:12px; color:var(--parchment-dim);}

  .hero{padding:20px clamp(20px,5vw,64px) 60px; max-width:1000px; margin:0 auto;}
  .hero-img{width:100%; max-height:420px; object-fit:cover; border-radius:12px; box-shadow:var(--shadow); margin-bottom:32px; background:var(--ink-2);}
  .cat-tag{font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--amber-dim); margin-bottom:14px; display:inline-block;}
  h1{font-size:clamp(30px,4.5vw,48px); font-weight:500; margin-bottom:20px; line-height:1.1;}
  .desc{font-size:16px; line-height:1.8; color:var(--parchment-dim); margin-bottom:36px; max-width:65ch;}

  .spec-sheet{display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--line); border:1px solid var(--line); margin-bottom:36px;}
  .spec-item{background:var(--ink); padding:16px 18px;}
  .spec-label{font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--parchment-dim); margin-bottom:6px;}
  .spec-value{font-size:15px; font-weight:500;}

  .groupchat-note{
    border:1px dashed var(--amber-dim); border-radius:8px; padding:18px 20px;
    font-size:13px; color:var(--parchment-dim); margin-bottom:32px; display:none;
  }
  .groupchat-note b{color:var(--parchment);}

  .cta-row{display:flex; align-items:center; gap:18px; flex-wrap:wrap;}
  .btn-primary{
    background:var(--amber); color:var(--ink); padding:16px 32px; border-radius:4px;
    font-weight:600; font-size:14px; border:none; cursor:pointer; display:inline-block;
  }
  #loadingState, #errorState{text-align:center; padding:100px 20px; color:var(--parchment-dim); font-size:14px;}
  #errorState{display:none;}
</style>
</head>
<body>
  <script src="common.js"></script>

<nav>
  <div class="brand">tixtee<span>.xyz</span></div>
  <a class="back" href="index.html">← Back to all events</a>
</nav>

<div id="loadingState">Loading event…</div>
<div id="errorState">This event couldn't be found. <a href="index.html" style="text-decoration:underline;">Go back home</a>.</div>

<div class="hero" id="eventContent" style="display:none;">
  <img class="hero-img" id="eventImage" src="" alt="">
  <div class="cat-tag mono" id="eventCategory"></div>
  <h1 id="eventTitle"></h1>
  <p class="desc" id="eventDescription"></p>

  <div class="spec-sheet">
    <div class="spec-item">
      <div class="spec-label">Date</div>
      <div class="spec-value" id="eventDate"></div>
    </div>
    <div class="spec-item">
      <div class="spec-label">Time</div>
      <div class="spec-value" id="eventTime"></div>
    </div>
    <div class="spec-item">
      <div class="spec-label">Venue</div>
      <div class="spec-value" id="eventVenue"></div>
    </div>
    <div class="spec-item">
      <div class="spec-label">Capacity</div>
      <div class="spec-value" id="eventCapacity"></div>
    </div>
  </div>

  <div class="groupchat-note" id="groupchatNote">
    <b>This event has a group chat.</b> You'll get access once you've bought a ticket.
  </div>

  <div class="cta-row">
    <a href="#" class="btn-primary" id="buyBtn">Buy Ticket</a>
  </div>
</div>

<script>
  const API = 'http://127.0.0.1:4000/api';
  const params = new URLSearchParams(window.location.search);
  const eventId = params.get('id');

  async function loadEvent(){
    if(!eventId){
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      return;
    }
    try{
      const res = await fetch(`${API}/events/${eventId}`);
      if(!res.ok) throw new Error('not found');
      const ev = await res.json();

      document.getElementById('eventImage').src = ev.image_url || 'images/tix.jpg';
      document.getElementById('eventCategory').textContent = (ev.category || 'Event').toUpperCase();
      document.getElementById('eventTitle').textContent = ev.title;
      document.getElementById('eventDescription').textContent = ev.description || 'More details coming soon.';
      document.getElementById('eventDate').textContent = new Date(ev.event_date).toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' });
      document.getElementById('eventTime').textContent = [ev.start_time, ev.end_time].filter(Boolean).join(' – ') || 'TBA';
      document.getElementById('eventVenue').textContent = ev.venue || 'TBA';
      document.getElementById('eventCapacity').textContent = ev.capacity ? `${ev.capacity} seats` : 'Open';

      const priceText = ev.price ? `Buy Ticket — ₦${Number(ev.price).toLocaleString()}` : 'Buy Ticket';
      document.getElementById('buyBtn').textContent = priceText;
      document.getElementById('buyBtn').href = `mailto:hello@tixtee.xyz?subject=Ticket for ${encodeURIComponent(ev.title)}`;

      if(ev.has_groupchat){
        document.getElementById('groupchatNote').style.display = 'block';
      }

      document.title = `${ev.title} — tixtee`;
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('eventContent').style.display = 'block';
    }catch(err){
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
    }
  }
  loadEvent();
</script>
</body>
</html>
