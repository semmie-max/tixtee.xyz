<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — tixtee</title>
  <link rel="icon" type="image/png" href="/images/logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/common.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
  body{
    background:#fff; color:#1a1a1a; min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{width:100%; max-width:380px;}
  .logo{font-size:14px; font-weight:700; letter-spacing:1px; margin-bottom:28px;}
  .logo span{color:#707070; font-weight:400;}
  h1{font-size:24px; font-weight:700; margin-bottom:6px; letter-spacing:-0.5px;}
  .sub{font-size:13px; color:#909090; margin-bottom:28px;}
  label{display:block; font-size:12px; font-weight:600; color:#4a4a4a; margin-bottom:6px;}
  input{
    width:100%; padding:12px 14px; margin-bottom:18px;
    border:1px solid #d5d5d5; border-radius:10px; font-size:14px; outline:none;
  }
  input:focus{border-color:#47034E;}
  button{
    width:100%; background:#1a1a1a; color:#fff; border:none;
    padding:13px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer;
  }
  button:hover{background:#47034E;}
  .msg{font-size:13px; margin-bottom:16px; padding:10px 12px; border-radius:8px; display:none;}
  .msg.error{background:#fdecea; color:#b3261e; display:block;}
  .msg.success{background:#eafaf0; color:#1e7a3d; display:block;}
  .step{display:none;}
  .step.active{display:block;}
  .foot{text-align:center; font-size:13px; color:#707070; margin-top:20px;}
  .foot a{color:#47034E; font-weight:600; text-decoration:none;}
</style>
</head>
<body>
  <script src="/common.js"></script>
  <div class="card">
    <div class="logo">TIXTEE<span>.XYZ</span></div>
    <div class="msg" id="msg"></div>

    <!-- STEP 1: enter email -->
    <div class="step active" id="step1">
      <h1>Reset your password</h1>
      <p class="sub">Enter your email and we'll send you a code.</p>
      <label>Email</label>
      <input type="email" id="email" required>
      <button id="sendCodeBtn">Send reset code</button>
    </div>

    <!-- STEP 2: enter code -->
    <div class="step" id="step2">
      <h1>Check your email</h1>
      <p class="sub">Enter the 6-digit code we just sent you.</p>
      <label>Reset code</label>
      <input type="text" id="code" maxlength="6" placeholder="123456">
      <button id="verifyCodeBtn">Verify code</button>
    </div>
    <div class="step" id="step3">
      <h1>Set a new password</h1>
      <p class="sub">Choose a new password for your account.</p>
      <label>New password</label>
      <input type="password" id="newPassword" minlength="6" required>
      <button id="resetBtn">Update password</button>
    </div>
    <div class="step" id="step4">
      <h1>All set</h1>
      <p class="sub">Your password's been updated.</p>
      <a href="/login"><button>Go to login</button></a>
    </div>

    <p class="foot">Remembered it? <a href="/login">Log in</a></p>
  </div>

<script>
  const API = 'https://api.tixtee.xyz/api';
  let userEmail = '';
  let resetToken = '';

  function showMsg(text, type){
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }
  function goToStep(n){
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step'+n).classList.add('active');
  }

  document.getElementById('sendCodeBtn').addEventListener('click', async () => {
    userEmail = document.getElementById('email').value;
    if(!userEmail){ showMsg('Enter your email first', 'error'); return; }

    try{
      const res = await fetch(`${API}/auth/forgot-password`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email: userEmail })
      });
      const data = await res.json();
      showMsg(data.message || 'Check your email for the code', 'success');
      goToStep(2);
    }catch(err){
      showMsg('Could not reach the server', 'error');
    }
  });

  document.getElementById('verifyCodeBtn').addEventListener('click', async () => {
    const code = document.getElementById('code').value;
    try{
      const res = await fetch(`${API}/auth/verify-reset-code`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email: userEmail, code })
      });
      const data = await res.json();
      if(!res.ok){ showMsg(data.error || 'Invalid code', 'error'); return; }
      resetToken = data.resetToken;
      showMsg('', ''); document.getElementById('msg').style.display = 'none';
      goToStep(3);
    }catch(err){
      showMsg('Could not reach the server', 'error');
    }
  });

  document.getElementById('resetBtn').addEventListener('click', async () => {
    const newPassword = document.getElementById('newPassword').value;
    try{
      const res = await fetch(`${API}/auth/reset-password`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ resetToken, newPassword })
      });
      const data = await res.json();
      if(!res.ok){ showMsg(data.error || 'Could not reset password', 'error'); return; }
      goToStep(4);
    }catch(err){
      showMsg('Could not reach the server', 'error');
    }
  });
</script>
</body>
</html>
