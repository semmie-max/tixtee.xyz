<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waitlist — tixtee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
  body{background:#f7f5f8; color:#1a1a1a; min-height:100vh; padding:40px 44px;}
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  a.back{font-size:12px; color:#47034E; text-decoration:none;}
  h1{font-size:24px; font-weight:700; margin:10px 0 6px;}
  .sub{font-size:13px; color:#8c8c8c; margin-bottom:28px;}
  .card{background:#fff; border-radius:16px; padding:24px; box-shadow:0 4px 20px rgba(0,0,0,0.03); max-width:700px;}
  .count{font-size:12px; color:#8c8c8c; margin-bottom:14px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; font-size:11px; text-transform:uppercase; color:#9a9a9a; padding-bottom:12px; border-bottom:1px solid #eee;}
  td{padding:12px 0; border-bottom:1px solid #f4f4f4;}
  .export-btn{
    background:#47034E; color:#fff; border:none; padding:10px 18px; border-radius:10px;
    font-size:12px; font-weight:600; cursor:pointer; margin-bottom:16px;
  }
  #gate{padding:60px; text-align:center; color:#9a9a9a; font-size:13px;}
</style>
</head>
<body>

<div id="gate">Checking your session…</div>

<div id="content" style="display:none;">
  <div class="topbar">
    <a class="back" href="/dashboard">← Back to dashboard</a>
  </div>
  <h1>Waitlist</h1>
  <p class="sub">Everyone who signed up for early access.</p>

  <div class="card">
    <div class="count" id="wlCount">Loading…</div>
    <button class="export-btn" id="exportBtn">Export as CSV</button>
    <table>
      <thead>
        <tr><th>Email</th><th>Joined</th></tr>
      </thead>
      <tbody id="wlRows"></tbody>
    </table>
  </div>
</div>

<script>
  const API = 'https://api.tixtee.xyz/api';
  let waitlistData = [];

  async function checkSession(){
    try{
      const res = await fetch(`${API}/auth/me`, { credentials:'include' });
      if(!res.ok) return window.location.href = '/login';
      const data = await res.json();
      if(!data.isAdmin) return window.location.href = '/pending';
      document.getElementById('gate').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      loadWaitlist();
    }catch(err){
      window.location.href = '/login';
    }
  }
  checkSession();

  async function loadWaitlist(){
    try{
      const res = await fetch(`${API}/waitlist`, { credentials:'include' });
      waitlistData = await res.json();
      document.getElementById('wlCount').textContent = `${waitlistData.length} signup${waitlistData.length === 1 ? '' : 's'}`;
      document.getElementById('wlRows').innerHTML = waitlistData.map(w => `
        <tr>
          <td>${w.email}</td>
          <td>${new Date(w.created_at).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })}</td>
        </tr>
      `).join('');
    }catch(err){
      document.getElementById('wlCount').textContent = 'Could not load waitlist.';
    }
  }

  document.getElementById('exportBtn').addEventListener('click', () => {
    const csv = 'Email,Joined\n' + waitlistData.map(w => `${w.email},${w.created_at}`).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'tixtee-waitlist.csv';
    a.click();
  });
</script>
</body>
</html>
